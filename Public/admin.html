<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Messages</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px;
      background: #f0f2f5;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { 
      text-align: center;
      color: #2c3e50;
    }
    .msg-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      border-left: 5px solid #3498db;
      position: relative;
    }
    .msg-card p { margin: 8px 0; }
    .msg-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .date { color: #888; font-size: 0.85rem; }
    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .delete-btn:hover { background: #c0392b; }
    .no-msgs { text-align: center; color: #7f8c8d; margin-top: 50px; }
  </style>
</head>
<body>

<div class="container">
    <h1>Inbox</h1>
    <div id="msgList">Loading secure connection...</div>
</div>

<script>
    let currentPassword = "";

    async function loadMessages() {
        if (!currentPassword) {
            currentPassword = prompt("Enter Admin Password:");
        }
        
        if (!currentPassword) {
            document.getElementById('msgList').innerHTML = '<p class="no-msgs">Access Denied. Refresh to try again.</p>';
            return;
        }

        try {
            const response = await fetch(`/api/messages?password=${encodeURIComponent(currentPassword)}`);
            
            if (response.status === 401) {
                alert("Incorrect password!");
                currentPassword = ""; // Reset so they can try again
                loadMessages();
                return;
            }

            const messages = await response.json();
            const list = document.getElementById('msgList');
            
            if (messages.length === 0) {
                list.innerHTML = '<p class="no-msgs">No messages yet. Your inbox is empty!</p>';
                return;
            }

            list.innerHTML = messages.map(msg => `
                <div class="msg-card">
                    <div class="msg-header">
                        <strong>${msg.name}</strong>
                        <span class="date">${new Date(msg.date).toLocaleString()}</span>
                    </div>
                    <p style="color: #555;">${msg.email}</p>
                    <p><em>"${msg.message}"</em></p>
                    <button class="delete-btn" onclick="deleteMessage(${msg.id})">Delete</button>
                </div>
            `).join('');
            
        } catch (err) {
            console.error("Error:", err);
            document.getElementById('msgList').innerHTML = '<p class="no-msgs">Error connecting to database.</p>';
        }
    }

    async function deleteMessage(id) {
        if (!confirm("Are you sure you want to delete this message forever?")) return;

        try {
            const response = await fetch(`/api/delete/${id}?password=${encodeURIComponent(currentPassword)}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                loadMessages(); // Refresh the list
            } else {
                alert("Failed to delete message.");
            }
        } catch (err) {
            console.error("Delete error:", err);
        }
    }

    window.onload = loadMessages;
</script>
</body>
</html>
