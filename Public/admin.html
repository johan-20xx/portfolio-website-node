<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Messages</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 20px; }
    .msg {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }
    .msg small { color: gray; }
    button {
      background: red;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>All Messages</h1>

<div id="msgList">Loading…</div>

<script>
function loadMessages() {
  fetch('/api/messages')
    .then(res => res.json())
    .then(data => {
      document.getElementById('msgList').innerHTML =
        data.map(m => `
          <div class="msg">
            <b>${m.name}</b> — <small>${m.email}</small><br>
            <p>${m.message}</p>
            <small>${m.date}</small><br>
            <button onclick="del(${m.id})">Delete</button>
          </div>
        `).join('');
    });
}

function del(id) {
  if (!confirm("Delete this message?")) return;
  fetch('/api/delete/' + id, { method: 'DELETE' })
    .then(() => loadMessages());
}

loadMessages();
</script>

</body>
</html>
